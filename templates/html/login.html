<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ticket Support | Login</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-robot"></i> AI Ticket Support
                </div>
                <p id="auth-subtitle">Welcome back! Please login to your account.</p>
            </div>
            
            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label for="login-username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" required>
                </div>
                <div class="input-group">
                    <label for="login-password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="auth-btn">
                    <span>Login</span> <i class="fas fa-sign-in-alt"></i>
                </button>
                <p class="toggle-text">Don't have an account? <a href="#" id="to-register">Register here</a></p>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="register-form" style="display: none;">
                <div class="input-group">
                    <label for="reg-username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" required>
                </div>
                <div class="input-group">
                    <label for="reg-fullname"><i class="fas fa-id-card"></i> Full Name</label>
                    <input type="text" id="reg-fullname" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label for="reg-email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="reg-email" placeholder="example@domain.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="auth-btn">
                    <span>Create Account</span> <i class="fas fa-user-plus"></i>
                </button>
                <p class="toggle-text">Already have an account? <a href="#" id="to-login">Login here</a></p>
            </form>

            <div id="auth-message" class="message"></div>
        </div>
        <div class="auth-footer">
            &copy; 2026 AI Routing Enterprise Solution
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
